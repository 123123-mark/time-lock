<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="定时锁应用 - 时间限制访问控制">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="x5-fullscreen" content="true">
    <meta name="x5-page-mode" content="app">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-title" content="定时锁">
    <title>定时锁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            overflow-x: hidden;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }

        #password-page {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .time-info {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .time-info h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .time-info p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }

        .countdown {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
        }

        .countdown p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .countdown-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }

        .password-form {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .password-form h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 16px;
        }

        .password-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            margin-bottom: 12px;
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .error-message {
            color: #ff4757;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        .unlock-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #00b8d4);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        #main-page {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 20px;
            position: relative;
        }

        #main-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            z-index: 0;
        }

        .content-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .header-card h2 {
            font-size: 18px;
            color: #00d4ff;
            margin-top: 16px;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .content-text {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
            white-space: pre-wrap;
        }

        .music-controls {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            backdrop-filter: blur(10px);
        }

        .music-btn {
            background: none;
            border: none;
            color: #00d4ff;
            font-size: 24px;
            cursor: pointer;
        }

        .music-info {
            color: #00d4ff;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }

        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        #lights-canvas, #lights-canvas-pwd {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        #petals-canvas, #petals-canvas-pwd {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        #bubbles-canvas, #hearts-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 加载页面 -->

        <div class="loading-spinner"></div>

    </div>

    <!-- 密码页面 -->

                <div class="error-message" id="error-message"></div>

        </div>
    </div>

    <!-- 主页面 -->
    <div id="main-page">

        <canvas id="petals-canvas"></canvas>
        <canvas id="bubbles-canvas"></canvas>
        <canvas id="hearts-canvas"></canvas>
        
        <div class="content-container">
            <div class="header-card">

            <div class="content-card">

    </div>

        // 全局变量
        let audio = null;
        let isPlaying = false;
        let isMuted = false;
        let currentMusicUrl = CONFIG.musicUrlB;
        
        // 处理用户交互，解决苹果设备音频播放限制
        function handleUserInteraction() {
            if (!audio) {
                // 创建音频对象
                audio = new Audio();
                audio.loop = true;
            }
            
            // 尝试播放静音音频以解锁音频上下文
            if (!isPlaying) {
                audio.volume = 0;
                audio.src = CONFIG.musicUrlA;
                audio.play().catch(e => {
                    console.log('初始音频播放被阻止，需要用户交互');
                });
                
                // 延迟恢复音量
                setTimeout(() => {
                    if (audio) {
                        audio.volume = 1;
                    }
                }, 100);
            }
            
            // 移除事件监听器，避免重复触发
            document.removeEventListener('click', handleUserInteraction);
            document.removeEventListener('touchstart', handleUserInteraction);
        }
        
        // 添加用户交互事件监听器
        document.addEventListener('click', handleUserInteraction);
        document.addEventListener('touchstart', handleUserInteraction);

            initLightsPwd();

            initHearts();

        // 检查访问权限
        function checkAccess() {
            const now = new Date();
            if (now >= CONFIG.unlockTime) {

            } else {
                showPasswordPage();
                updateCountdown();
                setInterval(updateCountdown, 1000);
            }
        }

        // 显示密码页面
        function showPasswordPage() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('password-page').style.display = 'block';
            
            // 绑定事件
            document.getElementById('unlock-btn').addEventListener('click', verifyPassword);
            document.getElementById('password').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    verifyPassword();
                }
            });
        }

        // 验证密码
        function verifyPassword() {
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            if (password === CONFIG.correctPassword) {
                errorMessage.textContent = '';
                showMainPage('A');
            } else if (password === CONFIG.testPassword) {

                showMainPage('B');
            } else {

                document.getElementById('lights-canvas').style.display = 'block';
                
                // 更改背景为冷色调
                document.getElementById('main-page').style.background = 'linear-gradient(135deg, #1a1a2e, #16213e, #0f3460)';
                
                // 更改文字颜色为浅色
                document.getElementById('main-page').style.color = '#fff';
                document.querySelectorAll('.content-card, .header-card, .music-controls').forEach(el => {
                    el.style.background = 'rgba(255, 255, 255, 0.1)';
                    el.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                });
                document.querySelectorAll('.header-card h2, .music-info').forEach(el => {
                    el.style.color = '#00d4ff';
                });
                document.querySelectorAll('.content-text').forEach(el => {
                    el.style.color = 'rgba(255, 255, 255, 0.9)';
                });
                document.querySelectorAll('.music-btn').forEach(el => {
                    el.style.color = '#00d4ff';
                });
            }
            
            // 自动播放音乐
            if (!audio) {
                audio = new Audio(currentMusicUrl);
                audio.loop = true;
            } else {
                audio.src = currentMusicUrl;
            }
            
            audio.play().catch(e => {
                console.log('自动播放被阻止，需要用户交互');
            });
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            
            // 绑定音乐控制
            document.getElementById('play-btn').addEventListener('click', togglePlay);
            document.getElementById('mute-btn').addEventListener('click', toggleMute);
        }

        // 更新倒计时
        function updateCountdown() {
            const now = new Date();
            const diff = CONFIG.unlockTime - now;
            
            if (diff <= 0) {
                document.getElementById('countdown').textContent = '已到时间！';
                showMainPage('B');
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('countdown').textContent = `${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        // 音乐控制
        function togglePlay() {
            if (!audio) {
                audio = new Audio(currentMusicUrl);
                audio.loop = true;
            }
            
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-btn').textContent = '▶';
            } else {
                audio.play().catch(e => {
                    console.log('自动播放被阻止，需要用户交互');
                });
                document.getElementById('play-btn').textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function toggleMute() {
            if (audio) {
                audio.muted = !isMuted;
                document.getElementById('mute-btn').textContent = isMuted ? '🔊' : '🔇';
                isMuted = !isMuted;
            }
        }

        // 初始化花瓣
        function initPetals() {
            petalsCanvas = document.getElementById('petals-canvas');
            ctxPetals = petalsCanvas.getContext('2d');
            
            // 调整画布大小
            function resizePetals() {
                petalsCanvas.width = window.innerWidth;
                petalsCanvas.height = window.innerHeight;
            }
            
            resizePetals();
            window.addEventListener('resize', resizePetals);
            
            // 创建花瓣
            for (let i = 0; i < 25; i++) {
                petals.push({
                    x: Math.random() * window.innerWidth,
                    y: -50 - Math.random() * 200,
                    size: 8 + Math.random() * 12,
                    speed: 0.5 + Math.random() * 1,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.05,
                    sway: Math.random() * 2,
                    swayOffset: Math.random() * Math.PI * 2
                });
            }
        }

        // 初始化光影
        function initLights() {
            lightsCanvas = document.getElementById('lights-canvas');
            ctxLights = lightsCanvas.getContext('2d');
            
            // 调整画布大小
            function resizeLights() {
                lightsCanvas.width = window.innerWidth;
                lightsCanvas.height = window.innerHeight;
            }
            
            resizeLights();
            window.addEventListener('resize', resizeLights);
            
            // 创建光影
            for (let i = 0; i < 15; i++) {
                lights.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: 50 + Math.random() * 150,
                    opacity: 0.05 + Math.random() * 0.15,
                    speed: 0.2 + Math.random() * 0.5,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        // 动画
        function animate() {
            requestAnimationFrame(animate);
            
            // 绘制主页面光影
            if (ctxLights) {
                ctxLights.clearRect(0, 0, lightsCanvas.width, lightsCanvas.height);
                
                lights.forEach(light => {
                    light.y -= light.speed;
                    if (light.y < -light.size) {
                        light.y = lightsCanvas.height + light.size;
                        light.x = Math.random() * lightsCanvas.width;
                    }
                    
                    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 + light.phase);
                    const currentOpacity = light.opacity * pulse;
                    
                    const gradient = ctxLights.createRadialGradient(
                        light.x, light.y, 0,
                        light.x, light.y, light.size
                    );
                    gradient.addColorStop(0, `rgba(0, 212, 255, ${currentOpacity})`);
                    gradient.addColorStop(0.5, `rgba(0, 184, 212, ${currentOpacity * 0.5})`);
                    gradient.addColorStop(1, `rgba(138, 43, 226, 0)`);
                    
                    ctxLights.fillStyle = gradient;
                    ctxLights.beginPath();
                    ctxLights.arc(light.x, light.y, light.size, 0, Math.PI * 2);
                    ctxLights.fill();
                });
            }
            
            // 绘制主页面花瓣
            if (ctxPetals) {
                ctxPetals.clearRect(0, 0, petalsCanvas.width, petalsCanvas.height);
                
                petals.forEach(petal => {
                    petal.y += petal.speed;
                    petal.x += Math.sin(Date.now() * 0.001 + petal.swayOffset) * petal.sway;
                    petal.rotation += petal.rotationSpeed;
                    
                    if (petal.y > petalsCanvas.height + 50) {
                        petal.y = -50;
                        petal.x = Math.random() * petalsCanvas.width;
                    }
                    
                    ctxPetals.save();
                    ctxPetals.translate(petal.x, petal.y);
                    ctxPetals.rotate(petal.rotation);
                    
                    // 绘制花瓣
                    ctxPetals.fillStyle = `rgba(255, 255, 255, ${0.7 + 0.2 * Math.sin(Date.now() * 0.001)})`;
                    ctxPetals.beginPath();
                    ctxPetals.moveTo(0, -petal.size / 2);
                    ctxPetals.bezierCurveTo(
                        petal.size * 0.8 / 2, -petal.size * 0.5 / 2,
                        petal.size * 0.8 / 2, petal.size * 0.3 / 2,
                        0, petal.size / 2
                    );
                    ctxPetals.bezierCurveTo(
                        -petal.size * 0.8 / 2, petal.size * 0.3 / 2,
                        -petal.size * 0.8 / 2, -petal.size * 0.5 / 2,
                        0, -petal.size / 2
                    );
                    ctxPetals.fill();
                    
                    ctxPetals.restore();
                });
            }
            
            // 绘制密码页面的效果
            drawPasswordPage();
            
            // 绘制泡泡和爱心
            drawBubblesAndHearts();
        }

        // 初始化泡泡
        function initBubbles() {
            bubblesCanvas = document.getElementById('bubbles-canvas');
            ctxBubbles = bubblesCanvas.getContext('2d');
            
            function resizeBubbles() {
                bubblesCanvas.width = window.innerWidth;
                bubblesCanvas.height = window.innerHeight;
            }
            
            resizeBubbles();
            window.addEventListener('resize', resizeBubbles);
            
            // 创建泡泡
            for (let i = 0; i < 20; i++) {
                bubbles.push({
                    x: Math.random() * window.innerWidth,
                    y: window.innerHeight + Math.random() * 200,
                    size: 10 + Math.random() * 30,
                    speed: 0.3 + Math.random() * 0.7,

                    wobble: Math.random() * 2,

                });

        // 初始化爱心
        function initHearts() {
            heartsCanvas = document.getElementById('hearts-canvas');
            ctxHearts = heartsCanvas.getContext('2d');
            
            function resizeHearts() {
                heartsCanvas.width = window.innerWidth;
                heartsCanvas.height = window.innerHeight;
            }
            
            resizeHearts();
            window.addEventListener('resize', resizeHearts);
            
            // 创建爱心
            for (let i = 0; i < 15; i++) {
                hearts.push({
                    x: Math.random() * window.innerWidth,
                    y: window.innerHeight + Math.random() * 300,
                    size: 15 + Math.random() * 25,
                    speed: 0.4 + Math.random() * 0.8,
                    opacity: 0.4 + Math.random() * 0.4,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.02,
                    sway: Math.random() * 1.5,
                    swayOffset: Math.random() * Math.PI * 2
                });
            }
        }

        // 绘制泡泡和爱心
        function drawBubblesAndHearts() {
            // 绘制泡泡
            if (ctxBubbles && currentPageType === 'A') {
                ctxBubbles.clearRect(0, 0, bubblesCanvas.width, bubblesCanvas.height);
                
                bubbles.forEach(bubble => {
                    bubble.y -= bubble.speed;
                    bubble.x += Math.sin(Date.now() * 0.001 + bubble.wobbleOffset) * bubble.wobble * 0.5;
                    
                    if (bubble.y < -bubble.size * 2) {
                        bubble.y = bubblesCanvas.height + bubble.size;
                        bubble.x = Math.random() * bubblesCanvas.width;
                    }
                    
                    // 绘制淡粉色泡泡
                    const gradient = ctxBubbles.createRadialGradient(
                        bubble.x - bubble.size * 0.3, bubble.y - bubble.size * 0.3, 0,
                        bubble.x, bubble.y, bubble.size
                    );
                    gradient.addColorStop(0, `rgba(255, 220, 230, ${bubble.opacity})`);
                    gradient.addColorStop(0.5, `rgba(255, 182, 193, ${bubble.opacity * 0.6})`);
                    gradient.addColorStop(1, `rgba(255, 150, 170, ${bubble.opacity * 0.2})`);
                    
                    ctxBubbles.fillStyle = gradient;
                    ctxBubbles.beginPath();
                    ctxBubbles.arc(bubble.x, bubble.y, bubble.size, 0, Math.PI * 2);
                    ctxBubbles.fill();
                    
                    // 高光
                    ctxBubbles.fillStyle = `rgba(255, 255, 255, ${bubble.opacity * 0.5})`;
                    ctxBubbles.beginPath();
                    ctxBubbles.arc(bubble.x - bubble.size * 0.3, bubble.y - bubble.size * 0.3, bubble.size * 0.2, 0, Math.PI * 2);
                    ctxBubbles.fill();
                });
            }
            
            // 绘制爱心
            if (ctxHearts && currentPageType === 'A') {
                ctxHearts.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
                
                hearts.forEach(heart => {
                    heart.y -= heart.speed;
                    heart.x += Math.sin(Date.now() * 0.001 + heart.swayOffset) * heart.sway;
                    heart.rotation += heart.rotationSpeed;
                    
                    if (heart.y < -heart.size * 2) {
                        heart.y = heartsCanvas.height + heart.size;
                        heart.x = Math.random() * heartsCanvas.width;
                    }
                    
                    ctxHearts.save();
                    ctxHearts.translate(heart.x, heart.y);
                    ctxHearts.rotate(heart.rotation);
                    
                    // 绘制爱心
                    ctxHearts.fillStyle = `rgba(255, 105, 140, ${heart.opacity})`;
                    ctxHearts.beginPath();
                    const size = heart.size;
                    ctxHearts.moveTo(0, size * 0.3);
                    ctxHearts.bezierCurveTo(-size * 0.5, -size * 0.3, -size, size * 0.1, 0, size);
                    ctxHearts.bezierCurveTo(size, size * 0.1, size * 0.5, -size * 0.3, 0, size * 0.3);
                    ctxHearts.fill();
                    
                    ctxHearts.restore();
                });
            }
        }
